services:
  - type: web
    name: gigshield-backend
    env: node
    plan: free
    rootDir: gigshield/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GIGSHIELD_SECRET
        sync: false
      - key: PORT
        value: 10000
